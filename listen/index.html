<style>
  :root {
    --amber: #F5A623;
    --amber-light: #FBBF24;
    --coral: #E17055;
    --charcoal: #2D3436;
    --cream: #FFF8F0;
    --cream-dark: #FFF0DB;
    --soft-shadow: 0 4px 30px rgba(245, 166, 35, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--charcoal);
    background: var(--cream);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    background:
      radial-gradient(ellipse 120% 60% at 50% 110%, rgba(245,166,35,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 80% 40% at 30% 100%, rgba(225,112,85,0.15) 0%, transparent 60%),
      linear-gradient(180deg, #FFF8F0 0%, #FFF0DB 100%);
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .sun-icon { width: 64px; height: 64px; margin-bottom: 1.5rem; animation: sunrise 1.2s ease-out both; }
  @keyframes sunrise { from { opacity: 0; transform: translateY(20px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .sun-icon svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 8px rgba(245,166,35,0.4)); }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 700; line-height: 1.1; text-align: center;
    color: var(--charcoal); margin-bottom: 0.5rem;
    animation: fadeUp 0.8s ease-out 0.2s both;
  }
  .brand-name em { color: var(--coral); font-style: italic; }
  .tagline {
    font-size: clamp(1.05rem, 2.5vw, 1.3rem); font-weight: 300;
    color: #636e72; text-align: center; margin-bottom: 2.5rem;
    letter-spacing: 0.02em; max-width: 30rem;
    animation: fadeUp 0.8s ease-out 0.4s both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .listen-card {
    background: white; border-radius: 20px; padding: 2.5rem 2rem;
    max-width: 460px; width: 100%; box-shadow: var(--soft-shadow);
    position: relative; overflow: hidden;
    animation: fadeUp 0.8s ease-out 0.5s both;
  }
  .listen-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--amber), var(--coral), var(--amber));
  }
  .listen-card h2 {
    font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600;
    margin-bottom: 0.5rem; color: var(--charcoal); text-align: center;
  }
  .listen-card .sub { font-size: 0.95rem; color: #636e72; text-align: center; margin-bottom: 1.75rem; line-height: 1.5; }
  .listen-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.7rem;
    width: 100%; padding: 1rem 1.25rem; margin-bottom: 0.9rem;
    border-radius: 14px; text-decoration: none; font-weight: 600; font-size: 1.02rem;
    transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
  }
  .listen-btn:last-child { margin-bottom: 0; }
  .listen-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.16); }
  .listen-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .btn-apple { background: #2D2D2D; color: #fff; }
  .btn-spotify { background: #1DB954; color: #fff; }
  .listen-foot { font-size: 0.82rem; color: #b2bec3; text-align: center; margin-top: 1.5rem; }
  .listen-foot a { color: var(--coral); text-decoration: none; font-weight: 500; }
  footer { padding: 2rem 1.5rem; text-align: center; color: #b2bec3; font-size: 0.8rem; }
  footer .footer-brand { font-family: 'Playfair Display', serif; color: var(--charcoal); font-size: 1rem; margin-bottom: 0.2rem; }
</style>

<!-- Analytics: GoatCounter (privacy-light, no cookies / no banner) -->
<!-- Records page views automatically (incl. the inbound ?utm_* query string  -->
<!-- so taps are attributable to the originating post), plus three custom      -->
<!-- outbound-click events when a visitor follows out to Apple / Spotify / email.-->
<!-- Site: themorninglift.goatcounter.com                                       -->
<!-- ============================================================= -->
<script>
  window.addEventListener('DOMContentLoaded', function () {
    // Append the originating campaign/content so a click ties back to its source post.
    function srcTag() {
      var p = new URLSearchParams(location.search);
      var camp = p.get('utm_campaign') || '';
      var cont = p.get('utm_content') || '';
      return (camp || cont) ? ('|' + camp + '|' + cont) : '';
    }
    function track(selector, eventName, title) {
      var el = document.querySelector(selector);
      if (!el) return;
      el.addEventListener('click', function () {
        if (window.goatcounter && typeof window.goatcounter.count === 'function') {
          window.goatcounter.count({ path: eventName + srcTag(), title: title, event: true });
        }
      });
    }
    // Buttons open in a new tab (target=_blank), so the page is NOT unloaded —
    // the async count() beacon completes normally before/while the new tab opens.
    track('.btn-apple',      'follow-apple',   'Listen → Apple Podcasts');
    track('.btn-spotify',    'follow-spotify', 'Listen → Spotify');
    track('.listen-foot a',  'follow-email',   'Listen → Email');
  });
</script>
<script data-goatcounter="https://themorninglift.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
